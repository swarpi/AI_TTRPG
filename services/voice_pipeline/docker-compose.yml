services:
  redis:
    image: redis/redis-stack:latest
    container_name: ttrpg_redis
    ports:
      - "6379:6379"
      - "8001:8001"   # RedisInsight web UI — http://localhost:8001
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
